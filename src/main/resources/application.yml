spring:
  config:
    import: optional:file:./deploy/.env[.properties]
  application:
    name: smart-worksite
  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:smart_worksite}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:${MYSQL_USER:worksite}}
    password: ${DB_PASSWORD:${MYSQL_PASSWORD:worksite}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: ${FILE_MULTIPART_MAX_FILE_SIZE:100MB}
      max-request-size: ${FILE_MULTIPART_MAX_REQUEST_SIZE:100MB}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: ${SERVER_PORT:8080}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-}]"

app:
  auth:
    jwt:
      secret: ${JWT_SECRET:SmartWorksiteJwtSecretKeyMustBe256BitsOrLongerForHS256Algorithm!!}
      expires-in-seconds: ${JWT_EXPIRES_IN_SECONDS:7200}
    login-security:
      max-failure-count: ${AUTH_LOGIN_MAX_FAILURE_COUNT:5}
      failure-window-seconds: ${AUTH_LOGIN_FAILURE_WINDOW_SECONDS:900}
      lock-seconds: ${AUTH_LOGIN_LOCK_SECONDS:900}
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://${MINIO_HOST:localhost}:${MINIO_API_PORT:9000}}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:smart-worksite}
  file:
    access-url-expire-seconds: ${FILE_ACCESS_URL_EXPIRE_SECONDS:600}
    max-size-bytes: ${FILE_MAX_SIZE_BYTES:104857600}
    parse:
      enabled: ${FILE_PARSE_ENABLED:true}
      max-pages: ${FILE_PARSE_MAX_PAGES:100}
      result-preview-length: ${FILE_PARSE_RESULT_PREVIEW_LENGTH:2000}
      max-input-chars: ${FILE_PARSE_MAX_INPUT_CHARS:120000}
      qwen-vl:
        endpoint: ${QWEN_VL_ENDPOINT:}
        api-key: ${QWEN_VL_API_KEY:}
        model: ${QWEN_VL_MODEL:qwen-vl-plus}
        connect-timeout-ms: ${QWEN_VL_CONNECT_TIMEOUT_MS:5000}
        read-timeout-ms: ${QWEN_VL_READ_TIMEOUT_MS:120000}
  task:
    outbox:
      dispatcher:
        enabled: ${TASK_OUTBOX_DISPATCHER_ENABLED:false}
        batch-size: ${TASK_OUTBOX_DISPATCHER_BATCH_SIZE:20}
        fixed-delay-ms: ${TASK_OUTBOX_DISPATCHER_FIXED_DELAY_MS:5000}
    worker:
      enabled: ${TASK_WORKER_ENABLED:false}
      worker-id: ${TASK_WORKER_ID:smart-worksite-worker}
      poll-delay-ms: ${TASK_WORKER_POLL_DELAY_MS:2000}
      pop-timeout-ms: ${TASK_WORKER_POP_TIMEOUT_MS:1000}
      lease-seconds: ${TASK_WORKER_LEASE_SECONDS:300}

  ai:
    python-service:
      base-url: ${AI_PYTHON_BASE_URL:http://127.0.0.1:8015}
      connect-timeout-ms: ${AI_PYTHON_CONNECT_TIMEOUT_MS:5000}
      read-timeout-ms: ${AI_PYTHON_READ_TIMEOUT_MS:120000}
      retry-count: ${AI_PYTHON_RETRY_COUNT:1}
      api-key: ${AI_PYTHON_API_KEY:dev-ai-service-key}
      paths:
        model-invoke: /v1/model/invoke
        agent-invoke: /v1/agent/invoke
        rag-search: /v1/rag/search
        rag-index: /v1/rag/index
        route: /v1/route
        context-prepare: /v1/context/prepare
        database-generate-query: /v1/database/generate-query
        database-summarize-result: /v1/database/summarize-result
        ocr-recognize: /v1/ocr/recognize
      database:
        max-rows: ${AI_DATABASE_MAX_ROWS:100}
        query-timeout-seconds: ${AI_DATABASE_QUERY_TIMEOUT_SECONDS:15}
      security:
        data-source-password-key: ${AI_DATA_SOURCE_PASSWORD_KEY:}
  report:
    crypto-agent-v3:
      base-url: ${CRYPTO_AGENT_V3_BASE_URL:http://127.0.0.1:8012}
      invoke-path: ${CRYPTO_AGENT_V3_INVOKE_PATH:/v1/report-generation/invoke}
      connect-timeout-seconds: ${CRYPTO_AGENT_V3_CONNECT_TIMEOUT_SECONDS:5}
      read-timeout-seconds: ${CRYPTO_AGENT_V3_READ_TIMEOUT_SECONDS:3000000}
