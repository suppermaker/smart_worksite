spring:
  config:
    import: optional:file:./deploy/.env[.properties]
  application:
    name: smart-worksite
  datasource:
    url: ${DB_URL:jdbc:mysql://${DB_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:smart_worksite}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:${MYSQL_USER:worksite}}
    password: ${DB_PASSWORD:${MYSQL_PASSWORD:worksite}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: ${SERVER_PORT:8080}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-}]"

app:
  task:
    timeout-scan:
      enabled: ${TASK_TIMEOUT_SCAN_ENABLED:false}
      fixed-delay-ms: ${TASK_TIMEOUT_SCAN_FIXED_DELAY_MS:}
      stale-after-ms: ${TASK_TIMEOUT_SCAN_STALE_AFTER_MS:}
      batch-limit: ${TASK_TIMEOUT_SCAN_BATCH_LIMIT:}
      reason: ${TASK_TIMEOUT_SCAN_REASON:}
  knowledge:
    retrieval:
      http:
        enabled: ${KNOWLEDGE_RETRIEVAL_HTTP_ENABLED:false}
        endpoint: ${KNOWLEDGE_RETRIEVAL_HTTP_ENDPOINT:}
        api-key: ${KNOWLEDGE_RETRIEVAL_HTTP_API_KEY:}
        timeout-ms: ${KNOWLEDGE_RETRIEVAL_HTTP_TIMEOUT_MS:}
  intelligence:
    model:
      openai-compatible:
        enabled: ${MODEL_PROVIDER_ENABLED:false}
        base-url: ${MODEL_PROVIDER_BASE_URL:}
        api-key: ${MODEL_PROVIDER_API_KEY:}
        provider: ${MODEL_PROVIDER_NAME:openai-compatible}
        default-model: ${MODEL_PROVIDER_DEFAULT_MODEL:}
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://${MINIO_HOST:localhost}:${MINIO_API_PORT:9000}}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:smart-worksite}
  file:
    access-url-expire-seconds: ${FILE_ACCESS_URL_EXPIRE_SECONDS:600}
